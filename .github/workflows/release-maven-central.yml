name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    # This workflow is release-ready, but it will not succeed until:
    # 1. Sonatype Central Portal account is created and namespace io.github.arthurhoch is verified.
    # 2. GPG key pair is generated and the public key is uploaded to a keyserver.
    # 3. The following GitHub secrets are configured in the repository settings:
    #    - MAVEN_CENTRAL_USERNAME: Central Portal token username
    #    - MAVEN_CENTRAL_PASSWORD: Central Portal token password
    #    - GPG_PRIVATE_KEY: ASCII-armored GPG private key (output of: gpg --armor --export-secret-keys KEY_ID)
    #    - GPG_PASSPHRASE: Passphrase for the GPG private key
    # 4. The version in pom.xml is the release version before tagging.
    # 5. CHANGELOG.md is updated with the release version before tagging.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run tests
        run: mvn -B verify

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.MAVEN_CENTRAL_USERNAME}</username>
                <password>${env.MAVEN_CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          SETTINGS

      - name: Publish to Maven Central
        run: mvn -B deploy -P release
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
